[build]
  base    = "client"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "18"

# Proxy REST API calls to the Render backend.
# IMPORTANT: Replace YOUR_RENDER_APP_NAME below with your actual Render service name.
[[redirects]]
  from   = "/api/*"
  to     = "https://YOUR_RENDER_APP_NAME.onrender.com/api/:splat"
  status = 200
  force  = true

# Proxy Socket.IO (WebSocket upgrade + polling fallback)
[[redirects]]
  from   = "/socket.io/*"
  to     = "https://YOUR_RENDER_APP_NAME.onrender.com/socket.io/:splat"
  status = 200
  force  = true

# SPA fallback — all unmatched routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
