services:
  - type: web
    name: whatsapp-status-viewer
    env: node
    region: oregon
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false           # Set this to your Netlify app URL after deploying
      - key: ADMIN_PASSWORD
        generateValue: true   # Render auto-generates a secure value; copy it from the dashboard

    # Persistent disk keeps the WhatsApp session alive across restarts/redeploys.
    # Requires Render's paid Starter plan ($7/month) — without this you must
    # re-scan the QR code every time Render's free tier spins the server down.
    disk:
      name: whatsapp-data
      mountPath: /opt/render/project/src/.wwebjs_auth
      sizeGB: 1
